<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Quiz Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .card-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 40px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-bottom: 30px;
        }

        .card-container:hover {
            transform: scale(1.05);
        }

        .card-container.flipped {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .card-content {
            color: white;
            font-size: 20px;
            font-weight: 500;
        }

        .card-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .card-number {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-prev, .btn-next {
            background-color: #667eea;
            color: white;
            min-width: 120px;
        }

        .btn-prev:hover, .btn-next:hover {
            background-color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-prev:disabled, .btn-next:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #667eea;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            text-align: center;
        }

        .stat {
            color: #666;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .hint-text {
            color: #999;
            font-size: 12px;
            margin-top: 15px;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .card-container {
                min-height: 250px;
                padding: 30px 20px;
            }

            .card-content {
                font-size: 18px;
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Flashcard Quiz Game</h1>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="card-container" id="card" onclick="flipCard()">
            <div class="card-label" id="cardLabel">Question</div>
            <div class="card-content" id="cardContent">What is the capital of France?</div>
            <div class="card-number" id="cardNumber">Card 1 of 5</div>
            <div class="hint-text">Click to reveal answer</div>
        </div>

        <div class="controls">
            <button class="btn-prev" id="prevBtn" onclick="previousCard()">← Previous</button>
            <button class="btn-next" id="nextBtn" onclick="nextCard()">Next →</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Current Card</div>
                <div class="stat-value" id="currentStat">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">Total Cards</div>
                <div class="stat-value" id="totalStat">5</div>
            </div>
            <div class="stat">
                <div class="stat-label">Progress</div>
                <div class="stat-value" id="progressStat">20%</div>
            </div>
        </div>
    </div>

    <script>
        // Flashcard Data
        const flashcards = [
            {
                question: "What is the capital of France?",
                answer: "Paris"
            },
            {
                question: "What is 2 + 2?",
                answer: "4"
            },
            {
                question: "What is the largest planet in our solar system?",
                answer: "Jupiter"
            },
            {
                question: "Who wrote 'Romeo and Juliet'?",
                answer: "William Shakespeare"
            },
            {
                question: "What is the chemical symbol for gold?",
                answer: "Au"
            }
        ];

        let currentCardIndex = 0;
        let isFlipped = false;

        // Initialize
        function init() {
            updateCard();
            updateButtons();
            updateProgress();
        }

        // Update Card Display
        function updateCard() {
            const card = flashcards[currentCardIndex];
            const cardContent = document.getElementById('cardContent');
            const cardLabel = document.getElementById('cardLabel');
            const cardNumber = document.getElementById('cardNumber');
            const cardElement = document.getElementById('card');

            if (isFlipped) {
                cardLabel.textContent = 'Answer';
                cardContent.textContent = card.answer;
                cardElement.classList.add('flipped');
            } else {
                cardLabel.textContent = 'Question';
                cardContent.textContent = card.question;
                cardElement.classList.remove('flipped');
            }

            cardNumber.textContent = `Card ${currentCardIndex + 1} of ${flashcards.length}`;
        }

        // Flip Card
        function flipCard() {
            isFlipped = !isFlipped;
            updateCard();
        }

        // Next Card
        function nextCard() {
            if (currentCardIndex < flashcards.length - 1) {
                currentCardIndex++;
                isFlipped = false;
                updateCard();
                updateButtons();
                updateProgress();
            }
        }

        // Previous Card
        function previousCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                isFlipped = false;
                updateCard();
                updateButtons();
                updateProgress();
            }
        }

        // Update Button States
        function updateButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            prevBtn.disabled = currentCardIndex === 0;
            nextBtn.disabled = currentCardIndex === flashcards.length - 1;
        }

        // Update Progress
        function updateProgress() {
            const progress = ((currentCardIndex + 1) / flashcards.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('currentStat').textContent = currentCardIndex + 1;
            document.getElementById('totalStat').textContent = flashcards.length;
            document.getElementById('progressStat').textContent = Math.round(progress) + '%';
        }

        // Initialize on page load
        window.addEventListener('load', init);
    </script>
</body>
</html>
